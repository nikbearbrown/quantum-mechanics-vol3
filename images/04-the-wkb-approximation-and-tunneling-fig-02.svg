  <text x="350" y="338" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="10" fill="#545454">Allowed: (2/√p) cos(∫p dx/ℏ − π/4)   ↔   Forbidden: (1/√|p|) exp(−∫|p| dx/ℏ)</text>
  <text x="350" y="354" text-anchor="middle"
