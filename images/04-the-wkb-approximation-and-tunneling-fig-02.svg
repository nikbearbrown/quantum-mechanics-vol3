  <!-- Linearized potential V(x) line through x0 -->
  <!-- V(x) = E + slope*(x-x0), slope = positive (V increases to the right) -->
  <!-- x0 at svg x=350, E at svg y=190 -->
  <!-- V slope: 55 px from x0 = x 295..405 correspond to V going from 130 to 250 -->
