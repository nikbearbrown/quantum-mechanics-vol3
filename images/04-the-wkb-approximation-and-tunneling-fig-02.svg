  <title id="fig-title-04-02">Airy function connection at a single classical turning point x₀: oscillatory WKB on the allowed side, exponential decay on the forbidden side, with a π/4 Maslov phase shift</title>
  <desc>Close-up view centered on turning point x₀. Left (allowed region): oscillatory Airy function with π/4 phase offset marked. Right (forbidden region): smooth single-lobe exponential decay. A distinct matching zone at x₀ bridges the two asymptotic forms.</desc>
