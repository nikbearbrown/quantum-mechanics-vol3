  <title id="fig-title-06">Stark Perturbation Matrix: 4×4 Block Structure</title>
  <desc>4x4 perturbation matrix W for the hydrogen n=2 manifold under a z-directed electric field, with rows and columns ordered as |2s>, |2p0>, |2p+1>, |2p-1>. Only the (1,2) and (2,1) off-diagonal entries are nonzero (shown in green), revealing a block-diagonal structure: the m=0 sector mixes while the m=+-1 states decouple.</desc>
