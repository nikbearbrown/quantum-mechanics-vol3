  <!-- shared y-axis left panel -->
  <line x1="100" y1="60" x2="100" y2="370" stroke="#ADADAD" stroke-width="1"
        marker-end="url(#up-arr)"/>

  <!-- Level bars (all above ground) — y positions -->
  <!-- Ground state at y=320, levels at y=260,190,120 -->
  <line x1="110" y1="120" x2="230" y2="120" stroke="#ADADAD" stroke-width="1.5"/>
  <line x1="110" y1="190" x2="230" y2="190" stroke="#ADADAD" stroke-width="1.5"/>
  <line x1="110" y1="260" x2="230" y2="260" stroke="#ADADAD" stroke-width="1.5"/>

  <!-- Ground state — highlighted green -->
  <line x1="110" y1="320" x2="230" y2="320" stroke="#2a1a0e" stroke-width="2.5"/>
  <text x="235" y="324"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">|0⟩ (ground)</text>

  <!-- Mixing arrows FROM each level INTO ground state (horizontal) — all negative -->
  <!-- From 260 to 320: short horizontal line at y=260 pointing right toward center indicator -->
  <line x1="165" y1="120" x2="165" y2="267" stroke="#2a1a0e" stroke-width="1.5"
        marker-end="url(#mix-r)"/>
  <line x1="155" y1="190" x2="155" y2="267" stroke="#2a1a0e" stroke-width="1.5"
