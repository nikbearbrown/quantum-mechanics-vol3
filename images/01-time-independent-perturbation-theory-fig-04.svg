  <title id="fig-title-04">Second-order energy correction: guaranteed downward shift for ground state, ambiguous for excited states</title>
  <desc>Two-panel diagram sharing a vertical energy axis. Left: ground state with all mixing arrows pointing negative (all denominators negative), net second-order shift is always downward. Right: excited state with arrows from above (negative) and below (positive) — net sign is ambiguous.</desc>
