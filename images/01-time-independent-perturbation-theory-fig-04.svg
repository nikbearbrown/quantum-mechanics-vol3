  <text x="480" y="280" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="14" fill="#787878">+</text>
  <text x="480" y="330" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="14" fill="#787878">+</text>

  <!-- Ambiguous net result — bidirectional short arrows -->
  <line x1="435" y1="240" x2="435" y2="280"
