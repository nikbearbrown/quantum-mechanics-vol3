  <polygon points="427,241 435,229 443,241" fill="#ADADAD"/>
  <polygon points="427,279 435,291 443,279" fill="#ADADAD"/>
  <text x="510" y="268"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">sign depends</text>
  <text x="510" y="280"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
