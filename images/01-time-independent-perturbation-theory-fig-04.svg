    <marker id="mix-gray-r" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0,6 2.5,0 5" fill="#787878"/>
    </marker>
  </defs>

  <rect width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle"
        font-family="'EB Garamond','Garamond',Georgia,serif"
        font-size="14" fill="#2a1a0e">
    Second-Order Correction: Ground State vs. Excited State
  </text>

  <!-- Panel divider -->
  <line x1="350" y1="42" x2="350" y2="390" stroke="#D4D4D4" stroke-width="1"/>

  <!-- ===== LEFT PANEL: GROUND STATE ===== -->
  <text x="175" y="50" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
