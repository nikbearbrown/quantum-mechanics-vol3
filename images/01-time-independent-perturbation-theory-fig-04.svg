  <text x="448" y="130" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="14" fill="#2a1a0e">−</text>
  <text x="448" y="183" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
