  <title id="fig-title-04">Tight-Binding Dispersion and Effective Mass Curvature</title>
  <desc>Tight-binding dispersion E(k) = E₀ − 2t cos(ka) over the first Brillouin zone from −π/a to +π/a. The band minimum at k=0 has positive curvature (m*>0, shown with gray dashed parabola) and the band maxima at k=±π/a have negative curvature (m*&lt;0, shown with red dashed parabola).</desc>
