  <title id="fig-title-03">WKB STM: Tunneling Current vs Tip-Sample Distance</title>
  <desc>WKB tunneling current I(d) ∝ exp(−2κd) with κ = 1.025 Å⁻¹ plotted on a logarithmic scale versus tip-sample distance from 2 to 12 Å; the linear decrease on the log scale confirms the exponential law with slope −2κ ≈ −2.05 Å⁻¹. Three experimental data points from Binnig and Rohrer are shown.</desc>
