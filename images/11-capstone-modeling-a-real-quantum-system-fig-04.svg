  <title id="fig-title-04">CdSe Quantum Dot: Band-Gap Blueshift vs Radius</title>
  <desc>CdSe quantum dot optical band gap versus dot radius from 1 to 6 nm: theory curve E_bulk + ℏ²π²/2m*R² (solid) falls steeply at small R and flattens toward the bulk gap of 1.74 eV at large R; four experimental data points show good agreement at R≥2 nm but theory overshoots at smaller radii due to band nonparabolicity.</desc>
