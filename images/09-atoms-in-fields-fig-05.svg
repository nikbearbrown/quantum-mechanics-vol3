  <title id="fig-title-05">Rabi Oscillations: On-Resonance and Off-Resonance P↓(t)</title>
  <desc>Rabi oscillations: spin-flip probability P_down versus dimensionless time omega1*t/pi for three detuning values. On-resonance (solid) oscillates fully 0 to 1; delta=omega1 (dashed gray) peaks at 1/2 with faster frequency; delta=3*omega1 (dotted) has small amplitude 1/10. Pi-pulse time marked at t=pi/omega1.</desc>
