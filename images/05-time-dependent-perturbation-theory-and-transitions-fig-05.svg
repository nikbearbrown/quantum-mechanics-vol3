        font-size="9" fill="#C8102E">N → continuum</text>

  <!-- Caption -->
  <text x="350" y="370" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#545454">
    Fermi's golden rule is the N→∞ limit: phase coherence is destroyed by the continuum density of states
  </text>
  <text x="350" y="385" text-anchor="middle"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="11" fill="#545454">
    Irreversibility emerges from the infinite number of final states — not from any single interaction
  </text>
