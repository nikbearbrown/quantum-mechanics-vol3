        font-size="9" fill="#545454">0</text>
  <text x="360" y="356" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="9" fill="#545454">t</text>

  <!-- P_total Y axis label -->
  <text x="42" y="200" text-anchor="middle" transform="rotate(-90,42,200)"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#545454">P_total  (0 to 1)</text>

  <!-- Legend for panel 3 -->
  <line x1="96" y1="327" x2="120" y2="327" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="125" y="331"
