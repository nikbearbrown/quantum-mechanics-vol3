  <title id="fig-title-05-05">As the number of final states increases from N=2 to N=50, coherent Rabi oscillations average out and total transition probability converges to linear Fermi golden-rule growth W·t</title>
  <desc>Three vertically stacked panels sharing a time axis. Top (N=2): clear oscillatory total probability. Middle (N=10): partially washed oscillations with emerging linear trend. Bottom (N=50): smooth linear rise matching the Fermi golden-rule reference line.</desc>
