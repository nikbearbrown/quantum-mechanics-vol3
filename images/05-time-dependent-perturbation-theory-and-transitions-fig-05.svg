  </text>

  <!-- ===== THREE PANELS, each height ~108px ===== -->
  <!-- Panel 1: y 32..108, Panel 2: y 114..190, Panel 3: y 196..272 -->
  <!-- Shared x: 90..630 (540px), t from 0 to 10 -->
  <!-- P y: panel top to panel-10 = ~68px per panel -->

  <!-- ~~~~ PANEL 1: N=2 ~~~~ -->
  <rect x="90" y="32" width="540" height="100" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="96" y="48"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">N = 2 final states</text>
  <!-- Y axis ticks -->
  <text x="80" y="123" text-anchor="end"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="9" fill="#545454">0</text>
  <text x="80" y="77" text-anchor="end"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="9" fill="#545454">1</text>
  <!-- Y axis line -->
  <line x1="90" y1="122" x2="90" y2="40" stroke="#2a1a0e" stroke-width="0.75"/>
  <!-- P=1 reference dashed -->
  <line x1="90" y1="77" x2="630" y2="77" stroke="#ADADAD" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- N=2: two modes produce oscillation. Use: P=2*sin^2(1.5*t/2)/1.5^2 * norm
       At t=2*pi/1.5 ~ 4.19: P_max = 2/1.5^2 = 0.89 (cap to ~1 range)
       For SVG: y = 122 - P_norm * 85, P_norm in [0,1] -->
  <!-- The oscillation peaks around P~0.89, so scale so peak = 0.89 normalized to 1 -->
  <!-- Points: t from 0..10 -->
  <!-- sin^2(1.5*t/2) for omega=1.5, two symmetric modes: total = 2*sin^2(1.5t/2)/1.5^2 -->
  <!-- normalize to max which occurs at t~2.1: P=0.89 -> scale by 1.0 since 0.89 &lt; 1 -->
  <!-- Generate schematic oscillation -->
  <polyline
    points="90,122 117,120 144,113 171,100 198,85 225,76 252,77 279,86 306,99 333,111 360,119 387,116 414,105 441,88 468,78 495,79 522,90 549,103 576,114 603,121 630,122"
    fill="none" stroke="#2a1a0e" stroke-width="1.5" stroke-linejoin="round"/>

