        font-size="9" fill="#545454">P_total(t)</text>
  <line x1="195" y1="327" x2="219" y2="327" stroke="#C8860E" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="224" y="331"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="9" fill="#545454">Fermi W·t</text>

  <!-- Annotation arrows showing convergence -->
  <line x1="655" y1="80" x2="655" y2="290"
        stroke="#C8102E" stroke-width="1.5" marker-end="url(#arr-05-05)"/>
  <text x="660" y="155" transform="rotate(90,660,155)"
