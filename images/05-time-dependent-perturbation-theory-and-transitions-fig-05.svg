  <line x1="90" y1="187" x2="630" y2="187" stroke="#ADADAD" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- N=10: partially averaged oscillations + some linear trend -->
  <!-- Use computed data scaled: spacing=1.0, 10 states at +-4.5 steps -->
  <!-- Schematic: shows some oscillatory bumps with overall rising trend -->
  <polyline
    points="90,232 117,222 144,204 171,185 198,171 225,166 252,173 279,189 306,204 333,208 360,200 387,185 414,172 441,169 468,178 495,195 522,210 549,213 576,204 603,190 630,180"
    fill="none" stroke="#2a1a0e" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ~~~~ PANEL 3: N=50 ~~~~ -->
  <rect x="90" y="252" width="540" height="100" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="96" y="268"
        font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif"
        font-size="10" fill="#2a1a0e">N = 50 final states</text>
  <!-- Y axis -->
  <text x="80" y="343" text-anchor="end"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="9" fill="#545454">0</text>
  <text x="80" y="297" text-anchor="end"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="9" fill="#545454">1</text>
  <line x1="90" y1="342" x2="90" y2="260" stroke="#2a1a0e" stroke-width="0.75"/>

  <!-- Fermi golden rule line W*t (dashed orange) -->
  <!-- W ~ 0.08, t_max=10, so at t=10 P=0.8 -> scale to 67% of panel height -->
  <line x1="90" y1="342" x2="630" y2="285"
        stroke="#C8860E" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- N=50 smooth nearly-linear rise (with small initial transient) -->
  <polyline
    points="90,342 117,339 144,335 171,330 198,324 225,318 252,312 279,307 306,302 333,298 360,295 387,292 414,290 441,289 468,288 495,287 522,287 549,287 576,288 603,289 630,290"
    fill="none" stroke="#2a1a0e" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Shared X-axis below panel 3 -->
  <line x1="90" y1="352" x2="635" y2="352"
        stroke="#2a1a0e" stroke-width="1" marker-end="url(#arr-05-05)"/>
  <text x="80" y="356" text-anchor="end"
