  <desc>Three-row grid. Each row shows one fine-structure correction: relativistic kinetic (all states), spin-orbit (l≠0 only), and Darwin term (l=0 only). Coverage bars reveal the complementarity of spin-orbit and Darwin: they partition the spectrum.</desc>
